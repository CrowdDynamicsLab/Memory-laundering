  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker><marker id="arrowb" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2563EB"/></marker><marker id="arrowo" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#D97706"/></marker><marker id="arrowr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#DC2626"/></marker><marker id="arrowg" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#059669"/></marker></defs>
  <text x="44" y="48" font-family="Arial" font-size="26" font-weight="700" fill="#0F172A">Memory Laundering Pipeline</text>
  <text x="44" y="75" font-family="Arial" font-size="14" fill="#475569">Toxic influence propagates through transcript and compressed memory; mitigation must align with each state channel.</text>
  <g font-family="Arial"><rect x="44" y="238" width="160" height="100" rx="14" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/><text x="62" y="268" font-size="16" font-weight="700" fill="#0F172A">Toxic Injection</text><text x="62" y="294" font-size="13" fill="#475569">Focal agent A1</text><text x="62" y="312" font-size="13" fill="#475569">produces toxic x1</text><text x="62" y="330" font-size="13" fill="#475569">tox(x1) &gt; τ</text>
  <rect x="280" y="185" width="190" height="88" rx="14" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/><text x="300" y="215" font-size="16" font-weight="700" fill="#0F172A">Transcript Channel</text><text x="300" y="241" font-size="13" fill="#475569">Raw messages persist</text><text x="300" y="259" font-size="13" fill="#475569">in conversation state</text>
  <rect x="280" y="330" width="190" height="100" rx="14" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/><text x="300" y="360" font-size="16" font-weight="700" fill="#0F172A">Memory Channel</text><text x="300" y="386" font-size="13" fill="#475569">Summary Mt compresses</text><text x="300" y="404" font-size="13" fill="#475569">explicit toxicity away</text><text x="300" y="422" font-size="13" fill="#475569">tox(Mt) &lt; τ</text>
  <rect x="278" y="470" width="205" height="70" rx="14" fill="#FFFFFF" stroke="#D97706" stroke-width="2"/><text x="298" y="498" font-size="15" font-weight="700" fill="#0F172A">Memory Laundering</text><text x="298" y="522" font-size="13" fill="#475569">classifier-clean state</text><text x="298" y="540" font-size="13" fill="#475569">still shifts behavior</text>
  <rect x="548" y="252" width="190" height="100" rx="14" fill="#FFFFFF" stroke="#94A3B8" stroke-width="2"/><text x="568" y="282" font-size="16" font-weight="700" fill="#0F172A">Downstream Context</text><text x="568" y="308" font-size="13" fill="#475569">C(v) = state + parent</text><text x="568" y="326" font-size="13" fill="#475569">agent samples πθ</text><text x="568" y="344" font-size="13" fill="#475569">produces response xt</text>
  <rect x="805" y="178" width="180" height="72" rx="14" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/><text x="825" y="207" font-size="16" font-weight="700" fill="#0F172A">Observed Signals</text><text x="825" y="232" font-size="13" fill="#475569">Δμ &gt; 0,  SPG(τ) &gt; 0</text>
  <rect x="805" y="284" width="180" height="82" rx="14" fill="#FFFFFF" stroke="#94A3B8" stroke-width="2"/><text x="825" y="313" font-size="16" font-weight="700" fill="#0F172A">Failure Channels</text><text x="825" y="338" font-size="13" fill="#475569">transcript backflow</text><text x="825" y="356" font-size="13" fill="#475569">memory laundering</text>
  <rect x="805" y="410" width="180" height="58" rx="14" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/><text x="825" y="436" font-size="15" font-weight="700" fill="#0F172A">Transcript Control</text><text x="825" y="456" font-size="12" fill="#475569">read S(C), write W(x)</text>
  <rect x="805" y="482" width="180" height="52" rx="14" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/><text x="825" y="508" font-size="15" font-weight="700" fill="#0F172A">Memory Control</text><text x="825" y="528" font-size="12" fill="#475569">rewrite / gate Mt</text>
  <rect x="805" y="548" width="180" height="44" rx="14" fill="#D1FAE5" stroke="#059669" stroke-width="2"/><text x="825" y="576" font-size="15" font-weight="700" fill="#0F172A">DPO Policy: πθ → πθ'</text>
  <rect x="548" y="455" width="190" height="86" rx="14" fill="#D1FAE5" stroke="#059669" stroke-width="2"/><text x="568" y="485" font-size="16" font-weight="700" fill="#0F172A">Integrated Defense</text><text x="568" y="510" font-size="13" fill="#475569">(πθ', S, W)</text><text x="568" y="528" font-size="13" fill="#475569">controls read, store,</text><text x="568" y="546" font-size="13" fill="#475569">and amplification</text></g>
