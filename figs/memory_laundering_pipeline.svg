  <rect x="44" y="445" width="300" height="95" rx="14" fill="#EEF2FF"/><text x="65" y="474" font-family="Arial" font-size="15" font-weight="700" fill="#0F172A">Primary evidence</text><text x="65" y="500" font-family="Arial" font-size="13" fill="#475569">Δμ: toxic-vs-neutral downstream toxicity shift</text><text x="65" y="520" font-family="Arial" font-size="13" fill="#475569">SPG(τ): gap when tox(Mt) &lt; τ</text><text x="65" y="540" font-family="Arial" font-size="13" fill="#475569">Clean-looking memory can remain behaviorally toxic.</text>
  <text x="44" y="600" font-family="Arial" font-size="11" fill="#64748B">Figure: Solid arrows show state flow. Dashed arrows show hidden behavioral influence or intervention targets.</text>
